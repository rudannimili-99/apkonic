<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scan - Apkonic</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right,#0a1931,#1f3c88);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .scan-container{
            width:90%;
            max-width:1000px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding:40px;
            border-radius:15px;
            color:white;
            text-align:center;
            box-shadow:0 0 30px rgba(0,0,0,0.3);
        }

        .scan-container h2{
            margin-bottom:30px;
            font-size:28px;
        }

        .cards{
            display:flex;
            gap:25px;
            justify-content:center;
            flex-wrap:wrap;
        }

        .card{
            background:white;
            color:black;
            padding:25px;
            width:280px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card h3{
            margin-bottom:15px;
        }

        .card input,
        .card textarea{
            width:100%;
            padding:10px;
            margin-bottom:15px;
            border-radius:6px;
            border:1px solid #ccc;
        }

        .card button{
            width:100%;
            padding:10px;
            border:none;
            border-radius:6px;
            background:#1f3c88;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

        .card button:hover{
            background:#0a1931;
        }

        .back-btn{
            margin-top:25px;
            display:inline-block;
            padding:10px 20px;
            background:#00c3ff;
            color:black;
            border-radius:6px;
            text-decoration:none;
            font-weight:bold;
        }

        .back-btn:hover{
            background:#00aaff;
        }

        @media(max-width:768px){
            body{
                height:auto;
                padding:30px 0;
            }
        }
    </style>
</head>

<body>

<div class="scan-container">

    <h2>Scan APK or Smishing Message</h2>

    <div class="cards">

        <div class="card">
            <h3>Verify Sender</h3>
<input type="text" id="senderInput" placeholder="Enter Sender ID">
<button onclick="verifySender()">Verify Sender</button>
<p id="senderResult"></p>
        </div>
        <div class="card">
            <h3>Paste SMS</h3>
<textarea id="sms" rows="4" placeholder="Paste message here"></textarea>
<button onclick="scanSMS()">Scan Message</button>
<p id="smsResult"></p>
        </div>

        <div class="card">
            <h3>Upload APK File</h3>
<input type="file" id="apkFile">
<button onclick="scanAPK()">Scan APK</button>
<p id="apkResult"></p>
        </div>


    </div>

    <a href="/" class="back-btn">⬅ Back to Home</a>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
