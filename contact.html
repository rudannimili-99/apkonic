<!DOCTYPE html>
<html>
<head>
    <title>Contact - Apkonic</title>
    <style>
        body{
            font-family: Arial;
            background: linear-gradient(to right,#0a1931,#1f3c88);
            color:white;
            text-align:center;
            padding:50px;
        }

        .form-box{
            background:white;
            color:black;
            max-width:500px;
            margin:auto;
            padding:30px;
            border-radius:10px;
        }

        input, textarea{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            padding:10px 20px;
            background:#1f3c88;
            color:white;
            border:none;
        }
    </style>
</head>

<body>

<h1>Contact Us</h1>

<div class="form-box">
    <input type="text" placeholder="Full Name">
    <input type="email" placeholder="Email">
    <input type="text" placeholder="Subject">
    <textarea rows="4" placeholder="Message"></textarea>
    <button onclick="alert('Message Sent Successfully!')">Send Message</button>
</div>

<a href="/" style="color:white;display:block;margin-top:20px;">⬅ Back to Home</a>

</body>
</html>
